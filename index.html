<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equipe de Boxe - Robenilson Vieira</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="logo-area">
      <img src="img/logo.png" alt="Logo do time de boxe" class="logo" />
    </div>
    <nav class="main-nav">
      <a href="#home">Home</a>
      <a href="https://pt.wikipedia.org/wiki/Robenilson_de_Jesus" target="_blank" rel="noopener noreferrer">Sobre mim</a>
      <a href="#contato">contato</a>
    </nav>
  </header>

  <main>
    <section id="home" class="hero">
      <div class="hero-image-container">
        <img src="img/Robenilson.png" alt="Imagem topo" class="hero-image" />
        <div class="hero-overlay"></div>
        <div class="hero-text">
          <h1>Robenilson Vieira</h1>
          <p class="hero-subtitle">
            Beijing 2008 
            - Londres 2012 
            <span class="rio-line">
              - Rio 2016
              <img src="img/logo_olimpiada.png" alt="Logo das Olimpíadas" class="olympic-logo" />
            </span>
          </p>
        </div>
      </div>
    </section>

    <section id="contato" class="contact-section">
      <div class="contact-card">
        <h2>Entre em contato</h2>
        <p>Siga no Instagram para novidades e treinos:</p>
        <a href="https://www.instagram.com/robenilsonvieira?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noopener noreferrer" class="instagram-link">
          <span class="instagram-icon" aria-hidden="true"></span>
          <span class="instagram-text">Instagram</span>
        </a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> Equipe de Boxe. Todos os direitos reservados.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
